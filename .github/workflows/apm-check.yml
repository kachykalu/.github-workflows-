name: APM Latency Probe
on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:
jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Measure latency phases and post to worker
        run: node .github/scripts/apm-check.js
        env:
          WORKER_URL:        ${{ secrets.WORKER_URL }}
          SSL_INGEST_TOKEN:  ${{ secrets.SSL_INGEST_TOKEN }}
